<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worktree Guardian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        
        h1 {
            font-size: 28px;
            color: #00d4ff;
        }
        
        .last-updated {
            color: #888;
            font-size: 14px;
        }
        
        .summary {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .summary-card {
            background: #16213e;
            padding: 20px 30px;
            border-radius: 10px;
            min-width: 120px;
        }
        
        .summary-card.total { border-left: 4px solid #00d4ff; }
        .summary-card.clean { border-left: 4px solid #22c55e; }
        .summary-card.dirty { border-left: 4px solid #eab308; }
        .summary-card.outdated { border-left: 4px solid #ef4444; }
        .summary-card.abandoned { border-left: 4px solid #f97316; }
        
        .summary-number {
            font-size: 36px;
            font-weight: bold;
        }
        
        .summary-label {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: #16213e;
            border: 1px solid #333;
            color: #888;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #00d4ff;
            color: #1a1a2e;
            border-color: #00d4ff;
        }
        
        .filter-btn.clean.active { background: #22c55e; border-color: #22c55e; }
        .filter-btn.dirty.active { background: #ffaa00; border-color: #ffaa00; }
        .filter-btn.outdated.active { background: #ff4444; border-color: #ff4444; }
        .filter-btn.abandoned.active { background: #888; border-color: #888; }

        .count-badge {
            background: #0f1629;
            color: #cbd5e1;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }

        .filter-btn.active .count-badge {
            background: rgba(15, 22, 41, 0.85);
            color: #e2e8f0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
        }
        
        th {
            background: #0f1629;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #00d4ff;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #1a1a2e;
        }
        
        tr:hover {
            background: #1f2b47;
        }

        .worktree-row td:first-child {
            border-left: 4px solid transparent;
        }

        .worktree-row.row-clean td:first-child { border-left-color: #22c55e; }
        .worktree-row.row-dirty td:first-child { border-left-color: #eab308; }
        .worktree-row.row-outdated td:first-child { border-left-color: #ef4444; }
        .worktree-row.row-abandoned td:first-child { border-left-color: #f97316; }
        
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status.clean { background: #22c55e33; color: #22c55e; }
        .status.dirty { background: #eab30833; color: #eab308; }
        .status.outdated { background: #ef444433; color: #ef4444; }
        .status.abandoned { background: #f9731633; color: #f97316; }
        
        .branch {
            color: #00d4ff;
            font-family: monospace;
            font-size: 13px;
        }
        
        .name {
            font-weight: 500;
        }
        
        .name.abandoned {
            color: #888;
            font-style: italic;
        }
        
        .days {
            color: #888;
            font-size: 13px;
        }

        .days.age-fresh { color: #22c55e; font-weight: 600; }
        .days.age-stale { color: #eab308; font-weight: 600; }
        .days.age-old { color: #ef4444; font-weight: 600; }
        
        .commit {
            font-family: monospace;
            color: #666;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        
        .error {
            background: #ff444433;
            color: #ff4444;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .summary { gap: 10px; }
            .summary-card { min-width: 100px; padding: 15px; }
            .summary-number { font-size: 24px; }
            th, td { padding: 10px; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌳 Worktree Guardian</h1>
            <div class="last-updated">Last updated: <span id="updated">-</span></div>
        </header>
        
        <div id="error" class="error" style="display:none"></div>
        
        <div class="summary">
            <div class="summary-card total">
                <div class="summary-number" id="total">-</div>
                <div class="summary-label">Total</div>
            </div>
            <div class="summary-card clean">
                <div class="summary-number" id="clean">-</div>
                <div class="summary-label">✅ Clean</div>
            </div>
            <div class="summary-card dirty">
                <div class="summary-number" id="dirty">-</div>
                <div class="summary-label">🔶 Dirty</div>
            </div>
            <div class="summary-card outdated">
                <div class="summary-number" id="outdated">-</div>
                <div class="summary-label">🔴 Outdated</div>
            </div>
            <div class="summary-card abandoned">
                <div class="summary-number" id="abandoned">-</div>
                <div class="summary-label">👻 Abandoned</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All <span class="count-badge" id="count-all">0</span></button>
            <button class="filter-btn clean" data-filter="clean">Clean <span class="count-badge" id="count-clean">0</span></button>
            <button class="filter-btn dirty" data-filter="dirty">Dirty <span class="count-badge" id="count-dirty">0</span></button>
            <button class="filter-btn outdated" data-filter="outdated">Outdated <span class="count-badge" id="count-outdated">0</span></button>
            <button class="filter-btn abandoned" data-filter="abandoned">Abandoned <span class="count-badge" id="count-abandoned">0</span></button>
        </div>
        
        <div id="loading" class="loading">Loading...</div>
        
        <table id="table" style="display:none">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Status</th>
                    <th class="hide-mobile">Last Commit</th>
                    <th class="hide-mobile">Days</th>
                    <th class="hide-mobile">Commit</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    
    <script>
        let allWorktrees = [];

        function getAgeClass(daysSinceCommit) {
            const days = Number(daysSinceCommit);

            if (!Number.isFinite(days)) return '';
            if (days < 1) return 'age-fresh';
            if (days <= 7) return 'age-stale';
            return 'age-old';
        }

        function getRowClass(worktree) {
            if (worktree.abandoned || worktree.status === 'abandoned') return 'row-abandoned';
            if (worktree.status === 'dirty') return 'row-dirty';
            if (worktree.status === 'outdated') return 'row-outdated';
            return 'row-clean';
        }

        function matchesFilter(worktree, filter) {
            if (filter === 'all') return true;
            if (filter === 'abandoned') return worktree.abandoned || worktree.status === 'abandoned';
            return worktree.status === filter;
        }

        function updateFilterCounts() {
            const filters = ['all', 'clean', 'dirty', 'outdated', 'abandoned'];

            filters.forEach(filter => {
                const count = filter === 'all'
                    ? allWorktrees.length
                    : allWorktrees.filter(wt => matchesFilter(wt, filter)).length;
                const countElement = document.getElementById(`count-${filter}`);
                if (countElement) countElement.textContent = count;
            });
        }

        function applyFilter(filter) {
            const filteredWorktrees = filter === 'all'
                ? allWorktrees
                : allWorktrees.filter(wt => matchesFilter(wt, filter));
            renderTable(filteredWorktrees);
        }
        
        async function loadData() {
            try {
                const response = await fetch('worktrees.json');
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();
                allWorktrees = data.worktrees;
                updateSummary(data.summary);
                updateFilterCounts();
                renderTable(allWorktrees);
                document.getElementById('updated').textContent = new Date(data.generated_at).toLocaleString();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('table').style.display = 'table';
                document.getElementById('error').style.display = 'none';
            } catch (err) {
                document.getElementById('loading').textContent = 'Error: ' + err.message;
                document.getElementById('error').textContent = 'Could not load worktree data. Run: python3 worktree_guardian.py > worktrees.json';
                document.getElementById('error').style.display = 'block';
            }
        }
        
        function updateSummary(summary) {
            document.getElementById('total').textContent = summary.total || 0;
            document.getElementById('clean').textContent = summary.clean || 0;
            document.getElementById('dirty').textContent = summary.dirty || 0;
            document.getElementById('outdated').textContent = summary.outdated || 0;
            document.getElementById('abandoned').textContent = summary.abandoned || 0;
        }
        
        function renderTable(worktrees) {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = worktrees.map(wt => `
                <tr class="worktree-row ${getRowClass(wt)} ${wt.abandoned ? 'abandoned' : ''}">
                    <td class="name ${wt.abandoned ? 'abandoned' : ''}">${wt.name}</td>
                    <td class="branch">${wt.branch}</td>
                    <td><span class="status ${wt.status}">${wt.status}</span></td>
                    <td class="hide-mobile">${wt.last_commit || '-'}</td>
                    <td class="hide-mobile days ${getAgeClass(wt.days_since_commit)}">${wt.days_since_commit}</td>
                    <td class="hide-mobile commit">${wt.commit}</td>
                </tr>
            `).join('');
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                applyFilter(filter);
            });
        });
        
        loadData();
    </script>
</body>
</html>
